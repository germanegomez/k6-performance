name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Prometheus..."
          timeout 60 bash -c 'until curl -sf http://localhost:9090/-/ready; do sleep 2; done'
          echo "Waiting for httpbin..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/get > /dev/null; do sleep 2; done'

      - name: Run smoke test
        run: docker compose run --rm k6 run /scripts/01-smoke.js

      - name: Tear down
        if: always()
        run: docker compose down -v
